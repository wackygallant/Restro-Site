{% extends 'admin_panel/admin_base.html' %}

{% block title %}Edit Category{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-dark text-white py-3">
            <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Create Category</h5>
        </div>
        <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}

                        <div class="row g-3">
                            <div class="col-md-8">
                                <label for="name" class="form-label fw-bold">Category Name</label>
                                <input type="text" class="form-control" id="name" name="name" placeholder="e.g. Main Course" required>
                            </div>
                            
                            <div class="col-md-4">
                                <label for="priority" class="form-label fw-bold">Priority</label>
                                <input type="number" class="form-control" id="priority" name="priority" min="0" value="0">
                            </div>
                        </div>

                        <div class="mt-5 d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-sm px-2">
                                <i class="bi bi-save me-2"></i>Create Category
                            </button>
                            <a href="{% url 'admin_categories' %}" class="btn btn-outline-secondary btn-sm px-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
