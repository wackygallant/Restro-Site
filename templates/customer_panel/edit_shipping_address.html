{% extends 'customer_panel/base.html' %}

{% block title %}Edit Shipping Address{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Edit Shipping Address</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="{{ form.contact_no.id_for_label }}" class="form-label fw-bold">Contact No.</label>
                            {{ form.contact_no.errors }}
                            <input type="text" name="contact_no" id="{{ form.contact_no.id_for_label }}" class="form-control" value="{{ form.contact_no.value|default:'' }}">
                        </div>
                        <div class="mb-3">
                            <label for="{{ form.address.id_for_label }}" class="form-label fw-bold">Address</label>
                            {{ form.address.errors }}
                            <input type="text" name="address" id="{{ form.address.id_for_label }}" class="form-control" value="{{ form.address.value|default:'' }}">
                        </div>
                        <div class="mb-3">
                            <label for="{{ form.city.id_for_label }}" class="form-label fw-bold">City</label>
                            {{ form.city.errors }}
                            <input type="text" name="city" id="{{ form.city.id_for_label }}" class="form-control" value="{{ form.city.value|default:'' }}">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark">Update Address</button>
                            <a href="{% url 'profile' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
