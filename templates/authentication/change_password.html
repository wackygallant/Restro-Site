{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password | Restro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <div class="card border-0 shadow-sm">

                <!-- Header -->
                <div class="card-body p-4">

                    <div class="text-center mb-4">
                        <h4 class="fw-bold mb-1">Change Password</h4>
                        <p class="text-muted small mb-0">
                            {{ edit_user.username }}
                        </p>
                    </div>

                    <!-- Form -->
                    <form method="post">
                        {% csrf_token %}

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email"
                                value="{{ edit_user.email }}" readonly>
                            <label for="email">Email</label>
                        </div>

                        {% if not user.is_superuser %}
                        <!-- Current Password -->
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="currentPassword"
                                    name="password" placeholder="Current Password" required>
                                <label for="currentPassword">Current Password</label>
                            </div>
                            <button class="btn btn-outline-secondary toggle-password" type="button" data-target="currentPassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        {% endif %}

                        <!-- New Password -->
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password1"
                                    name="password1" placeholder="New Password" required>
                                <label for="password1">New Password</label>
                            </div>
                            <button class="btn btn-outline-secondary toggle-password" type="button" data-target="password1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <!-- Confirm Password -->
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password2"
                                    name="password2" placeholder="Confirm Password" required>
                                <label for="password2">Confirm Password</label>
                            </div>
                            <button class="btn btn-outline-secondary toggle-password" type="button" data-target="password2">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <!-- Buttons -->
                        <div class="d-grid gap-2 mb-3">
                            <button type="submit" class="btn btn-dark">
                                <i class="bi bi-shield-lock me-1"></i> Change Password
                            </button>

                            <a href="{% if not user.is_superuser %}{% url 'profile' %}{% else %}{% url 'admin_users' %}{% endif %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>

                        <!-- Footer -->
                        <div class="text-center">
                            <small class="text-muted">
                                Forgot password?
                                <a href="{% url 'reset_password' %}" class="text-decoration-none">
                                    Reset it
                                </a>
                            </small>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.querySelectorAll('.toggle-password').forEach(button => {
    button.addEventListener('click', function () {
        const targetId = this.getAttribute('data-target');
        const input = document.getElementById(targetId);
        const icon = this.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });
});
</script>

</body>
</html>
