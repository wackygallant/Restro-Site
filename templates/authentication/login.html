{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Restro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <div class="card border-0 shadow-sm">

                <div class="card-body p-4">

                    <!-- Header -->
                    <div class="text-center mb-4">
                        <h4 class="fw-bold mb-1">Restro Login</h4>
                        <p class="text-muted small mb-0">Welcome back 👋</p>
                    </div>

                    <!-- Messages -->
                    {% if form.errors or messages %}
                        {% for message in messages %}
                        <div class="alert alert-warning alert-dismissible fade show small" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    {% endif %}

                    <!-- Form -->
                    <form method="post">
                        {% csrf_token %}

                        <!-- Username -->
                        <div class="form-floating mb-3">
                            <input type="text"
                                class="form-control"
                                id="username"
                                name="username"
                                placeholder="Username"
                                required>
                            <label for="username">Username</label>
                        </div>

                        <!-- Password -->
                        <div class="input-group mb-3">

                            <div class="form-floating">
                                <input type="password"
                                    class="form-control"
                                    id="password"
                                    name="password"
                                    placeholder="Password"
                                    required>
                                <label for="password">Password</label>
                            </div>

                            <!-- Toggle -->
                            <button class="btn btn-outline-secondary toggle-password"
                                    type="button"
                                    data-target="password">
                                <i class="bi bi-eye"></i>
                            </button>

                        </div>

                        <!-- Submit -->
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-dark py-2">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                            </button>
                        </div>

                        <!-- Links -->
                        <div class="text-center small">
                            <div class="mb-1">
                                <span class="text-muted">Forgot password?</span>
                                <a href="{% url 'reset_password' %}" class="text-decoration-none">
                                    Reset it
                                </a>
                            </div>

                            <div>
                                <span class="text-muted">New here?</span>
                                <a href="{% url 'register' %}" class="text-decoration-none">
                                    Create an account
                                </a>
                            </div>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Toggle Password -->
<script>
document.querySelectorAll('.toggle-password').forEach(button => {
    button.addEventListener('click', function () {
        const input = document.getElementById(this.dataset.target);
        const icon = this.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });
});
</script>

</body>
</html>
