{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | Restro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<div class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="row w-100 justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5">

                    <!-- Header -->
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Create Account</h2>
                        <p class="text-muted small mb-0">Join Restro and start your journey</p>
                    </div>

                    <!-- Messages -->
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger alert-dismissible fade show small" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <!-- Form -->
                    <form method="post">
                        {% csrf_token %}

                        <!-- Username -->
                        <div class="form-floating mb-3">
                            <input type="text" name="username" id="username"
                                   class="form-control" placeholder="Username" required>
                            <label for="username">Username</label>
                        </div>

                        <!-- First Name -->
                        <div class="form-floating mb-3">
                            <input type="text" name="first_name" id="first_name"
                                   class="form-control" placeholder="First Name" required>
                            <label for="first_name">First Name</label>
                        </div>

                        <!-- Last Name -->
                        <div class="form-floating mb-3">
                            <input type="text" name="last_name" id="last_name"
                                   class="form-control" placeholder="Last Name" required>
                            <label for="last_name">Last Name</label>
                        </div>

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input type="email" name="email" id="email"
                                   class="form-control" placeholder="Email" required>
                            <label for="email">Email Address</label>
                        </div>

<!-- New Password -->
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password1"
                                    name="password1" placeholder="New Password" required>
                                <label for="password1">New Password</label>
                            </div>
                            <button class="btn btn-outline-secondary toggle-password" type="button" data-target="password1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <!-- Confirm Password -->
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password2"
                                    name="password2" placeholder="Confirm Password" required>
                                <label for="password2">Confirm Password</label>
                            </div>
                            <button class="btn btn-outline-secondary toggle-password" type="button" data-target="password2">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <!-- Submit -->
                        <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">
                            Sign Up
                        </button>

                        <!-- Footer -->
                        <div class="text-center mt-4">
                            <small class="text-muted">
                                Already have an account?
                                <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">
                                    Login
                                </a>
                            </small>
                        </div>

                    </form>

                </div>
            </div>

            <p class="text-center text-muted small mt-3 mb-0">
                © {{ now|date:"Y" }} Restro
            </p>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.querySelectorAll('.toggle-password').forEach(button => {
    button.addEventListener('click', function () {
        const targetId = this.getAttribute('data-target');
        const input = document.getElementById(targetId);
        const icon = this.querySelector('i');

        if (!input || !icon) return;

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    });
});
</script>
</body>
</html>
