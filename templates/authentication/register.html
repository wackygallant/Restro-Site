{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | Restro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="bg-light">

    <div class="container pt-5">
        <div class="row justify-content-center">

            <div class="col-12 col-md-6 col-lg-4">

                <div class="card login-card p-4 shadow-sm rounded-4">

                    <!-- Header -->
                    <div class="text-center mb-4">
                        <h1 class="h4 fw-bold">Restro Register</h1>
                        <p class="text-muted small mb-0">Create your account</p>
                    </div>

                    <!-- Messages -->
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger alert-dismissible fade show small">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <!-- Form -->
                    <form method="post">
                        {% csrf_token %}

                        <!-- Username -->
                        <div class="form-floating mb-3">
                            <input type="text" name="username" id="username"
                                   class="form-control" placeholder="Username" required>
                            <label for="username">Username</label>
                        </div>

                        <!-- First Name -->
                        <div class="form-floating mb-3">
                            <input type="text" name="first_name" id="first_name"
                                   class="form-control" placeholder="First Name" required>
                            <label for="first_name">First Name</label>
                        </div>

                        <!-- Last Name -->
                        <div class="form-floating mb-3">
                            <input type="text" name="last_name" id="last_name"
                                   class="form-control" placeholder="Last Name" required>
                            <label for="last_name">Last Name</label>
                        </div>

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input type="email" name="email" id="email"
                                   class="form-control" placeholder="Email" required>
                            <label for="email">Email</label>
                        </div>

                        <!-- Password -->
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                <input type="password" name="password1" id="password1"
                                       class="form-control" placeholder="Password" required>
                                <label for="password1">Password</label>
                            </div>
                            <button type="button" class="btn btn-outline-secondary toggle-password" data-target="password1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <!-- Confirm Password -->
                        <div class="input-group mb-3">
                            <div class="form-floating">
                                <input type="password" name="password2" id="password2"
                                       class="form-control" placeholder="Confirm Password" required>
                                <label for="password2">Confirm Password</label>
                            </div>
                            <button type="button" class="btn btn-outline-secondary toggle-password" data-target="password2">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <!-- Password Match -->
                        <div id="password-feedback" class="small mb-2"></div>

                        <!-- Submit -->
                        <button type="submit" class="btn btn-dark w-100 py-2 mb-3">
                            Sign Up
                        </button>

                        <!-- Footer -->
                        <div class="text-center">
                            <small class="text-muted">
                                Already have an account?
                                <a href="{% url 'login' %}" class="text-decoration-none">Login</a>
                            </small>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Toggle Password
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function () {
                const input = document.getElementById(this.dataset.target);
                const icon = this.querySelector('i');

                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';

                icon.classList.toggle('bi-eye', !isPassword);
                icon.classList.toggle('bi-eye-slash', isPassword);
            });
        });

        // Password Match Check
        const pass1 = document.getElementById('password1');
        const pass2 = document.getElementById('password2');
        const feedback = document.getElementById('password-feedback');

        function checkPasswords() {
            if (!pass2.value) {
                feedback.textContent = '';
                return;
            }

            if (pass1.value === pass2.value) {
                feedback.textContent = 'Passwords match';
                feedback.className = 'text-success small';
            } else {
                feedback.textContent = 'Passwords do not match';
                feedback.className = 'text-danger small';
            }
        }

        pass1.addEventListener('input', checkPasswords);
        pass2.addEventListener('input', checkPasswords);
    </script>

</body>
</html>
